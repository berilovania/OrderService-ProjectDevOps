services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-orders}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-orders}
      POSTGRES_DB: ${DATABASE_NAME:-orders}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-orders}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-orders}
      DATABASE_NAME: ${DATABASE_NAME:-orders}
      DATA_RETENTION_HOURS: ${DATA_RETENTION_HOURS:-24}

volumes:
  postgres_data:
