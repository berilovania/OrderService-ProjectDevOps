name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: orderservice-projectdevops
  IMAGE: ghcr.io/${{ github.repository_owner }}/orderservice-projectdevops

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orders
          POSTGRES_PASSWORD: orders_test
          POSTGRES_DB: orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_HOST: localhost
          DATABASE_USER: orders
          DATABASE_PASSWORD: orders_test
          DATABASE_NAME: orders_test
          DATABASE_PORT: 5432
        run: pytest tests/ -v --tb=short

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push yet)
        run: docker build -t order-service:${{ github.sha }} .

      - name: Vulnerability scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: order-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (only if scan passed)
        run: |
          docker tag order-service:${{ github.sha }} ${{ env.IMAGE }}:${{ github.sha }}
          docker tag order-service:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy manifests to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/"
          target: "~/order-service"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.IMAGE }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,IMAGE_NAME,DB_PASSWORD,GITHUB_SHA,REPO_OWNER
          script: |
            # Restart k3s to free memory before deploy, then restore kubeconfig permissions
            sudo systemctl restart k3s
            sleep 45
            sudo chmod 644 /etc/rancher/k3s/k3s.yaml

            # Create/update secret directly — password never touches disk or shell history
            kubectl create secret generic postgres-secret \
              --from-literal=POSTGRES_PASSWORD="$DB_PASSWORD" \
              --from-literal=POSTGRES_USER="orders" \
              --from-literal=POSTGRES_DB="orders" \
              --namespace order-service \
              --dry-run=client -o yaml | kubectl apply --validate=false -f -

            # Replace non-sensitive placeholders in deployment manifest
            cd ~/order-service/k8s
            sed -i "s|__GITHUB_USER__|$REPO_OWNER|g" deployment.yaml
            sed -i "s|__IMAGE_NAME__|$IMAGE_NAME|g" deployment.yaml

            # Apply manifests (postgres-secret.yaml excluded — managed above)
            kubectl apply --validate=false -f namespace.yaml
            kubectl apply --validate=false -f postgres-configmap.yaml
            kubectl apply --validate=false -f postgres-headless-service.yaml
            kubectl apply --validate=false -f postgres-service.yaml
            kubectl apply --validate=false -f postgres-statefulset.yaml
            kubectl apply --validate=false -f service.yaml
            kubectl rollout status statefulset/postgres \
              -n order-service --timeout=180s
            sleep 15
            kubectl apply --validate=false -f deployment.yaml
            kubectl set image deployment/order-service \
              order-service=${IMAGE}:${GITHUB_SHA} \
              -n order-service
            if ! kubectl rollout status deployment/order-service \
              -n order-service --timeout=600s; then
              echo "--- Pod status ---"
              kubectl get pods -n order-service -o wide
              echo "--- Order-service pod events ---"
              kubectl describe pods -n order-service -l app=order-service | tail -40
              echo "--- Order-service logs ---"
              kubectl logs -n order-service -l app=order-service --tail=50 2>/dev/null || true
              exit 1
            fi
