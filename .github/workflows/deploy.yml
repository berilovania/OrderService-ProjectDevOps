name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: orderservice-projectdevops
  IMAGE: ghcr.io/${{ github.repository_owner }}/orderservice-projectdevops

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orders
          POSTGRES_PASSWORD: orders_test
          POSTGRES_DB: orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Audit Python dependencies
        run: pip-audit -r app/requirements.txt --desc on

      - name: Run tests
        env:
          DATABASE_HOST: localhost
          DATABASE_USER: orders
          DATABASE_PASSWORD: orders_test
          DATABASE_NAME: orders_test
          DATABASE_PORT: 5432
        run: pytest tests/ -v --tb=short

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push yet)
        run: docker build -t order-service:${{ github.sha }} .

      - name: Vulnerability scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: order-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (only if scan passed)
        run: |
          docker tag order-service:${{ github.sha }} ${{ env.IMAGE }}:${{ github.sha }}
          docker tag order-service:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy manifests to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: gcp
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "k8s/"
          target: "~/order-service"

      - name: Deploy to GCP
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.IMAGE }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          DOMAIN: ${{ secrets.DOMAIN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
        with:
          host: ${{ secrets.GCP_HOST }}
          username: gcp
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE,IMAGE_NAME,DB_PASSWORD,METRICS_TOKEN,GRAFANA_ADMIN_PASSWORD,GITHUB_SHA,REPO_OWNER,DOMAIN,ACME_EMAIL
          script: |
            set +x  # Ensure no command tracing that could leak secrets

            # Ensure namespaces exist before creating secrets
            kubectl create namespace order-service --dry-run=client -o yaml | kubectl apply -f -
            kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

            # Create/update secrets via --dry-run (never touches disk or shell history)
            kubectl create secret generic postgres-secret \
              --from-literal=POSTGRES_PASSWORD="$DB_PASSWORD" \
              --from-literal=POSTGRES_USER="orders" \
              --from-literal=POSTGRES_DB="orders" \
              --namespace order-service \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic metrics-token \
              --from-literal=metrics-token="$METRICS_TOKEN" \
              --namespace order-service \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic metrics-token \
              --from-literal=metrics-token="$METRICS_TOKEN" \
              --namespace monitoring \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic grafana-admin \
              --from-literal=admin-password="$GRAFANA_ADMIN_PASSWORD" \
              --namespace monitoring \
              --dry-run=client -o yaml | kubectl apply -f -

            # Replace non-sensitive placeholders in deployment manifest
            cd ~/order-service/k8s
            sed -i "s|__GITHUB_USER__|$REPO_OWNER|g" deployment.yaml
            sed -i "s|__IMAGE_NAME__|$IMAGE_NAME|g" deployment.yaml
            sed -i "s|__DOMAIN__|$DOMAIN|g" ingress.yaml
            sed -i "s|__ACME_EMAIL__|$ACME_EMAIL|g" clusterissuer.yaml
            sed -i "s|__DOMAIN__|$DOMAIN|g" monitoring/grafana-deployment.yaml

            # Apply manifests (secrets managed above via kubectl create)
            kubectl apply -f namespace.yaml
            kubectl apply -f network-policy.yaml
            kubectl apply -f postgres-pvc.yaml
            # Migrate from Deployment to StatefulSet (one-time, safe to repeat)
            kubectl delete deployment postgres -n order-service --ignore-not-found
            kubectl apply -f postgres-deployment.yaml
            kubectl apply -f postgres-service.yaml
            kubectl apply -f service.yaml
            kubectl apply -f clusterissuer.yaml
            kubectl apply -f ingress.yaml
            kubectl rollout status statefulset/postgres \
              -n order-service --timeout=180s
            echo "Waiting for PostgreSQL to accept connections..."
            for i in $(seq 1 30); do
              if kubectl exec -n order-service postgres-0 -- pg_isready -U orders -q 2>/dev/null; then
                echo "PostgreSQL ready after ${i}x2s"
                break
              fi
              sleep 2
            done
            kubectl apply -f deployment.yaml
            kubectl set image deployment/order-service \
              order-service=${IMAGE}:${GITHUB_SHA} \
              -n order-service
            if ! kubectl rollout status deployment/order-service \
              -n order-service --timeout=600s; then
              echo "--- Pod status ---"
              kubectl get pods -n order-service -o wide
              echo "--- Order-service pod events ---"
              kubectl describe pods -n order-service -l app=order-service | tail -40
              echo "--- Order-service logs ---"
              kubectl logs -n order-service -l app=order-service --tail=50 2>/dev/null || true
              exit 1
            fi

            # Deploy monitoring stack
            kubectl apply -f monitoring/namespace.yaml
            kubectl apply -f monitoring/network-policy.yaml
            kubectl apply -f monitoring/prometheus-config.yaml
            kubectl apply -f monitoring/prometheus-deployment.yaml
            kubectl apply -f monitoring/prometheus-service.yaml
            kubectl apply -f monitoring/grafana-datasource.yaml
            kubectl apply -f monitoring/grafana-dashboard-provider.yaml
            kubectl apply -f monitoring/grafana-dashboard.yaml
            kubectl apply -f monitoring/grafana-deployment.yaml
            kubectl apply -f monitoring/grafana-service.yaml
            kubectl apply -f grafana-externalname-service.yaml
            kubectl rollout status deployment/prometheus -n monitoring --timeout=120s
            kubectl rollout status deployment/grafana -n monitoring --timeout=120s
