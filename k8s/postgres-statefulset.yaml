apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: order-service
  labels:
    app: postgres
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
        - name: setup-replica
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data
          command:
            - bash
            - -c
            - |
              ORDINAL=${HOSTNAME##*-}
              PRIMARY="postgres-0.postgres-headless.order-service.svc.cluster.local"

              if [ "$ORDINAL" = "0" ]; then
                echo "Primary pod — skipping basebackup."
                exit 0
              fi

              if [ -f "$PGDATA/PG_VERSION" ]; then
                echo "Data directory already initialized — skipping basebackup."
                exit 0
              fi

              echo "Waiting for primary ($PRIMARY) to be ready..."
              until pg_isready -h "$PRIMARY" -U "$POSTGRES_USER"; do
                echo "  Not ready yet, retrying in 5s..."
                sleep 5
              done

              echo "Running pg_basebackup from primary..."
              until PGPASSWORD="$POSTGRES_PASSWORD" pg_basebackup \
                  -h "$PRIMARY" \
                  -U "$POSTGRES_USER" \
                  -D "$PGDATA" \
                  -Xs -R -P --checkpoint=fast; do
                echo "  pg_basebackup failed, retrying in 10s..."
                rm -rf "$PGDATA"/*
                sleep 10
              done
              echo "Replica initialized successfully."
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 30
            periodSeconds: 15

      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0755

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
